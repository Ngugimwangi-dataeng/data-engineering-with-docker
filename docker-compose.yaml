services:
  postgres:
    image: postgres:16
    container_name: db1_postgres
    environment:
      POSTGRES_USER: alex
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex -d db1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./pipeline
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
